  type: integer
  min: 1
  max: 20

featured_list_count:
  default: 10
  type: integer
  min: 1
  max: 30

featured_list_filter:
  default: "latest"
  type: enum
  choices:
    - latest
    - top
    - new
    - hot

leaderboard_count:
  default: 8
  type: integer
  min: 1
  max: 20

events_count:
  default: 5
  type: integer
  min: 1
  max: 15

sidebar_category_id:
  default: 4
  type: integer

sidebar_tags_count:
  default: 10
  type: integer
  min: 1
  max: 30

banner_categories:
  type: list
  list_type: category
  default: ""

cta_link:
  default: "/signup"
  type: string
